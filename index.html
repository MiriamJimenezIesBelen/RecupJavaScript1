<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comunidades autónomas - Miriam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="module" src="AB_script.js"></script>
</head>
<body class="container mt-4">
<h1>Comunidades autónomas - Miriam Jiménez</h1>

<div class="row">
    <div class="col-4">
        <!-- Ordenación -->
        <div class="mb-3">
            <strong>Ordenar por:</strong>
            <select id="criterio-orden" class="form-select">
                <option value="nombre">Nombre</option>
                <option value="poblacion">Población (desc)</option>
            </select>
        </div>

        <!-- Lista de comunidades -->
        <ul id="lista-comunidades" class="list-group"></ul>
    </div>

    <div class="col-8">
        <!-- Formulario -->
        <div id="formulario" style="display:none">
            <h3 id="form-nombre"></h3>
            <p>Capital: <span id="form-capital"></span></p>
            <div class="mb-3">
                <label for="form-presidente" class="form-label">Presidente/a:</label>
                <input type="text" id="form-presidente" class="form-control">
                <div id="error-msg" class="text-danger" style="display:none">
                    El campo no puede estar vacío
                </div>
                <div id="exito-msg" class="text-success" style="display:none">
                    ¡Guardado correctamente!
                </div>
            </div>
            <button id="btn-guardar" class="btn btn-primary" disabled>
                Guardar cambios en el Presidente/a
            </button>
        </div>
    </div>
</div>
</body>
</html>
