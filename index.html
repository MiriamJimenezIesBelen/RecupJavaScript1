<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comunidades autónomas - Miriam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="module" src="MJ_script.js"></script>
</head>
<body class="container mt-4">
    <h1>Comunidades y Ciudades Autónomas de España</h1>

    <!-- Ordenacion -->
    <div class="mb-3">
        <label>Ordenar por:</label>
        <select id="criterio-orden" class="form-select w-auto">
            <option value="nombre">Nombre</option>
            <option value="poblacion">Población</option>
        </select>
    </div>

    <div class="mb-3">
        <ul id="lista-comunidades" class="list-group"></ul>
    </div>

    <!-- Formulario -->
    <div id="formulario" style="display:none">
        <label>Comunidad Autónoma:</label>
        <input type="text" id="comunidad" class="form-control mb-2" readonly>

        <label>Capital: </label>
        <input type="text" id="capital" class="form-control mb-2" readonly>

        <label>Presidente/a:</label>
        <input type="text" id="presidente" class="form-control mb-2">
        <span id="error-msg" style="display:none; color:red">El campo no puede estar vacío</span>
        <span id="exito-msg" style="display:none; color:green">¡Guardado correctamente!</span>


        <label>Provincias:</label>
        <input type="text" id="provincias" class="form-control mb-2" readonly>


        <button id="guardar" class="btn btn-primary mt-2" disabled>
            Guardar cambios en el Presidente/a
        </button>
    </div>

</body>
</html>
